name: Dataset Check

# 当 PR 修改 datasets/ 目录下的文件时触发
on:
  pull_request:
    paths:
      - 'datasets/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate dataset files
        run: python tools/prepare_dataset.py --check-manifest
